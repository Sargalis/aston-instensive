services:
  discovery-service:
    image: eclipse-temurin:21-jdk-alpine
    container_name: discovery-service
    volumes:
      - ./discovery-service/target/discovery-service-1.0-SNAPSHOT.jar:/app/app.jar
    command: java -Xmx256m -Xms128m -jar /app/app.jar
    ports:
      - "8761:8761"
    networks:
      - task8-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  config-server:
    image: eclipse-temurin:21-jdk-alpine
    container_name: config-server
    volumes:
      - ./config-server/target/config-server-1.0-SNAPSHOT.jar:/app/app.jar
    command: java -Xmx256m -Xms128m -jar /app/app.jar
    ports:
      - "8888:8888"
    depends_on:
      discovery-service:
        condition: service_healthy
    networks:
      - task8-network
    dns:
      - 8.8.8.8
      - 1.1.1.1
    restart: unless-stopped

  postgres-user:
    image: postgres:16-alpine
    container_name: postgres-user
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: samarin4571730
    ports:
      - "5432:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data
    networks:
      - task8-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-notification:
    image: postgres:16-alpine
    container_name: postgres-notification
    environment:
      POSTGRES_DB: notification_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: samarin4571730
    ports:
      - "5433:5432"
    volumes:
      - postgres_notification_data:/var/lib/postgresql/data
    networks:
      - task8-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notification_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - task8-network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.3.8
    container_name: kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    networks:
      - task8-network
    restart: unless-stopped

  user-service:
    image: eclipse-temurin:21-jdk-alpine
    container_name: user-service
    volumes:
      - ./user-service/target/user-service-1.0-SNAPSHOT.jar:/app/app.jar
    command: java -Xmx256m -Xms128m -jar /app/app.jar
    ports:
      - "8081:8081"
    depends_on:
      discovery-service:
        condition: service_healthy
      config-server:
        condition: service_started
      postgres-user:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - task8-network
    restart: unless-stopped

  notification-service:
    image: eclipse-temurin:21-jdk-alpine
    container_name: notification-service
    volumes:
      - ./notification-service/target/notification-service-1.0-SNAPSHOT.jar:/app/app.jar
    command: java -Xmx256m -Xms128m -jar /app/app.jar
    ports:
      - "8082:8082"
    depends_on:
      discovery-service:
        condition: service_healthy
      config-server:
        condition: service_started
      postgres-notification:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - task8-network
    restart: unless-stopped

  gateway-service:
    image: eclipse-temurin:21-jdk-alpine
    container_name: gateway-service
    volumes:
      - ./gateway-service/target/gateway-service-1.0-SNAPSHOT.jar:/app/app.jar
    command: java -Xmx256m -Xms128m -jar /app/app.jar
    ports:
      - "8080:8080"
    depends_on:
      discovery-service:
        condition: service_healthy
      user-service:
        condition: service_started
      notification-service:
        condition: service_started
    networks:
      - task8-network
    restart: unless-stopped

networks:
  task8-network:
    driver: bridge

volumes:
  postgres_user_data:
  postgres_notification_data: